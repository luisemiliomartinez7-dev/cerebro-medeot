<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Medeot Connessi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 720px; height: 100vh; display: flex; flex-direction: column; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
  .header { background: #1a4a2e; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .header-logo { width: 40px; height: 40px; background: #2d7a4f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; opacity: 0.85; }
  .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .msg.bot .avatar { background: #d1fae5; color: #065f46; }
  .msg.user .avatar { background: #1a4a2e; color: white; }
  .bubble { padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .msg.bot .bubble { background: #f3f4f6; color: #111; border-top-left-radius: 4px; }
  .msg.user .bubble { background: #1a4a2e; color: white; border-top-right-radius: 4px; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 11px 15px; background: #f3f4f6; border-radius: 16px; border-top-left-radius: 4px; width: fit-content; }
  .typing span { width: 7px; height: 7px; background: #9ca3af; border-radius: 50%; animation: pulse 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{transform:scale(1);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 12px; }
  .sug { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1.5px solid #2d7a4f; background: white; color: #1a4a2e; cursor: pointer; transition: all 0.15s; }
  .sug:hover { background: #d1fae5; }
  .input-area { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid #e5e7eb; background: white; flex-shrink: 0; }
  .input-area textarea { flex: 1; border: 1.5px solid #d1d5db; border-radius: 12px; padding: 10px 14px; font-size: 14px; resize: none; font-family: inherit; outline: none; min-height: 44px; max-height: 120px; line-height: 1.5; transition: border 0.15s; }
  .input-area textarea:focus { border-color: #2d7a4f; }
  .send-btn { width: 44px; height: 44px; border-radius: 12px; background: #1a4a2e; border: none; cursor: pointer; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: #2d7a4f; }
  .send-btn:disabled { background: #9ca3af; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-logo">🌿</div>
    <div>
      <h1>Asistente Medeot Connessi</h1>
      <p>Consultá procedimientos, roles y procesos internos</p>
    </div>
    <div class="status"><div class="dot"></div>Activo</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="avatar">M</div>
      <div class="bubble">
        ¡Hola! Soy el asistente interno de Medeot Connessi.<br><br>
        Puedo ayudarte con preguntas sobre procedimientos, roles, compras, stock, servicios técnicos, drones, administración y más.<br><br>
        ¿Qué necesitás saber?
      </div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="sug" onclick="sendSuggestion(this)">¿Cómo hago un pedido de compra?</button>
    <button class="sug" onclick="sendSuggestion(this)">¿Quién autoriza las compras?</button>
    <button class="sug" onclick="sendSuggestion(this)">¿Cómo registro un servicio de drone?</button>
    <button class="sug" onclick="sendSuggestion(this)">¿Cómo hago una rendición de servicios?</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Escribí tu pregunta..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9658;</button>
  </div>
</div>

<script>
const conversationHistory = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggestion(btn) {
  document.getElementById("input").value = btn.textContent;
  document.getElementById("suggestions").style.display = "none";
  sendMessage();
}

function addMessage(text, role) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + role;
  const initials = role === "bot" ? "M" : "YO";
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n- /g, "<br>• ")
    .replace(/\n\n/g, "<br><br>")
    .replace(/\n/g, "<br>");
  div.innerHTML = "<div class=\"avatar\">" + initials + "</div><div class=\"bubble\">" + formatted + "</div>";
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typing-indicator";
  div.innerHTML = "<div class=\"avatar\">M</div><div class=\"typing\"><span></span><span></span><span></span></div>";
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;
  isLoading = true;

  addMessage(text, "user");
  conversationHistory.push({ role: "user", content: text });
  showTyping();

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: "assistant", content: reply });
      addMessage(reply, "bot");
    } else {
      addMessage("Hubo un error al procesar tu pregunta. Intentá de nuevo.", "bot");
    }
  } catch (err) {
    removeTyping();
    addMessage("Error de conexión. Verificá tu conexión a internet.", "bot");
  }

  document.getElementById("sendBtn").disabled = false;
  isLoading = false;
}
</script>
</body>
</html>
